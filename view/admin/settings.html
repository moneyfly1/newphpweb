{extend name="layout/app" /}

{block name="content"}
<section class="content-grid two-column">
    <form class="panel-card" method="post" action="/admin/settings">
        <input type="hidden" name="csrf_token" value="{$csrfToken}">
        <span class="eyebrow">站点配置</span>
        <h3>前后台联动设置</h3>
        <div class="field-grid">
            <label class="field">
                <span>站点名称</span>
                <input type="text" name="app_name" value="{$app_name}">
            </label>
            <label class="field">
                <span>站点地址</span>
                <input type="text" name="base_url" value="{$base_url}">
            </label>
            <label class="field">
                <span>首页标题</span>
                <input type="text" name="landing_headline" value="{$landing_headline}">
            </label>
            <label class="field">
                <span>首页说明</span>
                <textarea name="landing_blurb" rows="4">{$landing_blurb}</textarea>
            </label>
            <label class="field">
                <span>登录页提示</span>
                <textarea name="login_notice" rows="3">{$login_notice}</textarea>
            </label>
            <label class="field">
                <span>顶部提示 1</span>
                <input type="text" name="hero_stat_one" value="{$hero_stat_one}">
            </label>
            <label class="field">
                <span>顶部提示 2</span>
                <input type="text" name="hero_stat_two" value="{$hero_stat_two}">
            </label>
            <label class="field">
                <span>顶部提示 3</span>
                <input type="text" name="hero_stat_three" value="{$hero_stat_three}">
            </label>
            <label class="field">
                <span>首页公告</span>
                <textarea name="landing_notice" rows="3">{$landing_notice}</textarea>
            </label>
            <label class="field">
                <span>商城提示</span>
                <textarea name="shop_note" rows="3">{$shop_note}</textarea>
            </label>
            <label class="field">
                <span>公告内容</span>
                <textarea name="notice_text" rows="4">{$notice_text}</textarea>
            </label>
            <label class="field">
                <span>支持邮箱</span>
                <input type="email" name="support_email" value="{$support_email}">
            </label>
            <label class="field">
                <span>客服 QQ</span>
                <input type="text" name="support_qq" value="{$support_qq|default=''}" placeholder="例如 123456789">
            </label>
            <label class="field">
                <span>订阅显示站点地址</span>
                <input type="text" name="subscription_site_url" value="{$subscription_site_url|default=''}" placeholder="留空则使用站点地址">
            </label>
            <label class="field">
                <span>订阅显示站点名称</span>
                <input type="text" name="subscription_site_name" value="{$subscription_site_name|default=''}" placeholder="留空则使用站点名称">
            </label>
            <label class="field">
                <span>订阅说明</span>
                <textarea name="subscription_notice" rows="3">{$subscription_notice|default=''}</textarea>
            </label>
            <label class="field">
                <span>签到奖励</span>
                <input type="number" step="0.01" min="0" name="checkin_reward" value="{$checkin_reward}">
            </label>
            <label class="field">
                <span>额外设备单价</span>
                <input type="number" step="0.01" min="0" name="extra_device_price" value="{$extra_device_price}">
            </label>
            <label class="field">
                <span>订阅余额折算比例</span>
                <input type="number" step="0.01" min="0" name="balance_convert_rate" value="{$balance_convert_rate}">
            </label>
            <label class="field">
                <span>启用支付方式</span>
                <input type="text" name="payment_enabled_text" value="{$payment_enabled_text}" placeholder="balance,alipay,wechat">
            </label>
        </div>
        <button class="button button-primary" type="submit" data-loading-text="正在保存站点设置...">保存设置</button>
    </form>

    <article class="panel-card">
        <span class="eyebrow">生效范围</span>
        <h3>这些内容会直接驱动前台</h3>
        <ul class="list-clean">
            <li>首页、登录页、商城、签到和订阅折算金额</li>
            <li>用户端可见的支付方式与业务提示</li>
            <li>前台下单、工单、设置修改都会回流后台</li>
            <li>后台改完保存后，前台刷新即可读取最新数据库配置</li>
        </ul>
    </article>
</section>
{/block}
