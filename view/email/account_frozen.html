<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:30px 15px;">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
  <tr><td style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:36px 30px;text-align:center;">
    <div style="font-size:40px;line-height:1;">🚫</div>
    <h1 style="margin:12px 0 0;font-size:22px;font-weight:600;color:#ffffff;letter-spacing:1px;">账户已冻结</h1>
  </td></tr>
  <tr><td style="background:#ffffff;padding:32px 30px;">
    <p style="margin:0 0 6px;font-size:15px;color:#333;">尊敬的 <strong>{$userName}</strong>，您好！</p>
    <p style="margin:0 0 20px;font-size:14px;color:#e53935;font-weight:600;">您的账户已被冻结，暂时无法使用相关服务。</p>
    <table width="100%" cellpadding="0" cellspacing="0" style="border-radius:8px;overflow:hidden;border:1px solid #eef0f5;margin-bottom:22px;">
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;width:100px;">冻结原因</td><td style="padding:10px 14px;font-size:13px;color:#e53935;font-weight:600;">{$reason}</td></tr>
    </table>
    <p style="margin:0 0 8px;font-size:14px;color:#666;">如有疑问，请联系客服处理：</p>
    <p style="text-align:center;margin:16px 0 0;">
      <a href="mailto:{$supportEmail}" style="display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#ffffff;padding:12px 40px;text-decoration:none;border-radius:24px;font-size:15px;font-weight:600;letter-spacing:1px;">{$supportEmail}</a>
    </p>
  </td></tr>
  <tr><td style="background:#f8f9fc;padding:20px 30px;text-align:center;">
    <p style="margin:0 0 4px;font-size:13px;color:#aaa;">{$appName}</p>
    <p style="margin:0;font-size:11px;color:#ccc;">此邮件由系统自动发送，请勿直接回复 · 如需退订请联系客服</p>
    <p style="margin:6px 0 0;font-size:11px;color:#ddd;">&copy; {$appName} All Rights Reserved</p>
  </td></tr>
</table>
</td></tr></table>
</body></html>
