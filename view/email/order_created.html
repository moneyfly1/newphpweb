<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:30px 15px;">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
  <tr><td style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:36px 30px;text-align:center;">
    <div style="font-size:40px;line-height:1;">📦</div>
    <h1 style="margin:12px 0 0;font-size:22px;font-weight:600;color:#ffffff;letter-spacing:1px;">订单创建成功</h1>
  </td></tr>
  <tr><td style="background:#ffffff;padding:32px 30px;">
    <p style="margin:0 0 20px;font-size:15px;color:#333;">尊敬的 <strong>{$userName}</strong>，您好！</p>
    <p style="margin:0 0 20px;font-size:14px;color:#666;">您的订单已成功创建，详情如下：</p>
    <table width="100%" cellpadding="0" cellspacing="0" style="border-radius:8px;overflow:hidden;border:1px solid #eef0f5;">
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;width:100px;">订单编号</td><td style="padding:10px 14px;font-size:13px;color:#333;">{$orderNo}</td></tr>
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;">套餐名称</td><td style="padding:10px 14px;font-size:13px;color:#333;">{$packageName}</td></tr>
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;">订单金额</td><td style="padding:10px 14px;font-size:15px;color:#e53935;font-weight:700;">¥{$amount}</td></tr>
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;">支付方式</td><td style="padding:10px 14px;font-size:13px;color:#333;">{$paymentMethod}</td></tr>
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;">创建时间</td><td style="padding:10px 14px;font-size:13px;color:#333;">{$createdAt}</td></tr>
    </table>
    <p style="margin:22px 0 0;font-size:13px;color:#999;line-height:1.6;">请尽快完成支付，以便激活您的订阅服务。</p>
  </td></tr>
  <tr><td style="background:#f8f9fc;padding:20px 30px;text-align:center;">
    <p style="margin:0 0 4px;font-size:13px;color:#aaa;">{$appName}</p>
    <p style="margin:0;font-size:11px;color:#ccc;">此邮件由系统自动发送，请勿直接回复 · 如需退订请联系客服</p>
    <p style="margin:6px 0 0;font-size:11px;color:#ddd;">&copy; {$appName} All Rights Reserved</p>
  </td></tr>
</table>
</td></tr></table>
</body></html>
