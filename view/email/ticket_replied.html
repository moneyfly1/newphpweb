<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:30px 15px;">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
  <tr><td style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:36px 30px;text-align:center;">
    <div style="font-size:40px;line-height:1;">💬</div>
    <h1 style="margin:12px 0 0;font-size:22px;font-weight:600;color:#ffffff;letter-spacing:1px;">工单有新回复</h1>
  </td></tr>
  <tr><td style="background:#ffffff;padding:32px 30px;">
    <p style="margin:0 0 20px;font-size:15px;color:#333;">尊敬的 <strong>{$userName}</strong>，您好！</p>
    <table width="100%" cellpadding="0" cellspacing="0" style="border-radius:8px;overflow:hidden;border:1px solid #eef0f5;margin-bottom:20px;">
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;width:100px;">工单编号</td><td style="padding:10px 14px;font-size:13px;color:#333;">{$ticketNo}</td></tr>
      <tr><td style="padding:10px 14px;background:#f8f9fc;color:#888;font-size:13px;">工单主题</td><td style="padding:10px 14px;font-size:13px;color:#333;font-weight:600;">{$ticketSubject}</td></tr>
    </table>
    <div style="background:#f8f9fc;border-left:4px solid #764ba2;border-radius:0 8px 8px 0;padding:16px 18px;margin:0 0 20px;font-size:13px;color:#555;line-height:1.7;">{$replyContent}</div>
    <p style="text-align:center;margin:22px 0 0;">
      <a href="{$ticketUrl}" style="display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#ffffff;padding:12px 40px;text-decoration:none;border-radius:24px;font-size:15px;font-weight:600;letter-spacing:1px;">查看工单</a>
    </p>
  </td></tr>
  <tr><td style="background:#f8f9fc;padding:20px 30px;text-align:center;">
    <p style="margin:0 0 4px;font-size:13px;color:#aaa;">{$appName}</p>
    <p style="margin:0;font-size:11px;color:#ccc;">此邮件由系统自动发送，请勿直接回复 · 如需退订请联系客服</p>
    <p style="margin:6px 0 0;font-size:11px;color:#ddd;">&copy; {$appName} All Rights Reserved</p>
  </td></tr>
</table>
</td></tr></table>
</body></html>
