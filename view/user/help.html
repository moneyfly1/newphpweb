{extend name="layout/app" /}

{block name="content"}
<section class="stats-grid">
    <article class="panel-card stat-card">
        <span>订阅导入</span>
        <strong>3 步完成</strong>
        <p>复制链接、选择客户端、完成导入</p>
    </article>
    <article class="panel-card stat-card">
        <span>支付支持</span>
        <strong>账户充值 / 套餐购买</strong>
        <p>统一在用户中心完成</p>

    <article class="panel-card">

        <div class="button-row">
            <a class="button button-ghost" href="/shop">套餐商店</a>
            <a class="button button-ghost" href="/subscriptions">订阅管理</a>
            <a class="button button-ghost" href="/tickets">工单系统</a>

</section>
